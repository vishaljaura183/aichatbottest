<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 720px;
      overflow: hidden;
    }

    /* ── Header ── */
    .chat-header {
      padding: 18px 22px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .bot-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .bot-avatar svg { width: 20px; height: 20px; fill: white; }
    .header-text h2 { font-size: 15px; font-weight: 600; color: #111827; }
    .header-text p  { font-size: 12px; color: #6b7280; margin-top: 1px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; margin-left: auto;
      box-shadow: 0 0 0 2px #dcfce7;
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    .message { display: flex; gap: 10px; align-items: flex-end; }
    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; flex-shrink: 0;
    }
    .message.bot  .msg-avatar { background: #eff6ff; color: #2563eb; }
    .message.user .msg-avatar { background: #2563eb; color: white; }

    .msg-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }
    .message.bot  .msg-bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
    }
    .message.user .msg-bubble {
      background: #2563eb;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 4px;
      text-align: right;
    }
    .message.bot .msg-time { text-align: left; }

    /* Typing indicator */
    .typing-dots { display: flex; gap: 4px; padding: 4px 2px; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%; background: #9ca3af;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    .chat-input-area {
      padding: 14px 18px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
    }
    #userInput {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      color: #111827;
      transition: border-color 0.15s;
    }
    #userInput:focus { border-color: #2563eb; }
    #userInput::placeholder { color: #9ca3af; }

    #sendBtn {
      width: 40px; height: 40px;
      background: #2563eb;
      border: none; border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    #sendBtn:hover   { background: #1d4ed8; }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #sendBtn svg { width: 18px; height: 18px; fill: white; }

    /* ── Error banner ── */
    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      margin: 0 20px;
      display: none;
    }
    .error-banner.show { display: block; }

    /* ── Config notice ── */
    .config-notice {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 8px;
      padding: 12px 16px;
      margin: 12px 20px 0;
      font-size: 13px;
      color: #92400e;
      display: none;
    }
    .config-notice code {
      background: #fef3c7;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <div class="chat-header">
    <div class="bot-avatar">
      <svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7H3a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7 14a1 1 0 1 0 0 2 1 1 0 0 0 0-2m10 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2M5 21v-2a7 7 0 0 0 7 0 7 7 0 0 0 7 0v2H5z"/></svg>
    </div>
    <div class="header-text">
      <h2>AI Assistant</h2>
      <p>Powered by OpenAI</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </div>

  <!-- Config notice (shown if API key not set) -->
  <div class="config-notice" id="configNotice">
    Open this file in a text editor and set your <code>OPENAI_API_KEY</code> and <code>PROMPT_ID</code> at the top of the script section.
  </div>

  <!-- Error banner -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Messages -->
  <div class="chat-messages" id="messages"></div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea id="userInput" rows="1" placeholder="Type your message…"></textarea>
    <button id="sendBtn" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  // ============================================================
  //  CONFIGURATION — update these two values
  // ============================================================
  const OPENAI_API_KEY = 'YOUR_OPENAI_API_KEY_HERE';
  const PROMPT_ID      = 'pmpt_69e34ad58ed081978590436c525fedd9079140e29fd441d9';
  const PROMPT_VERSION = '2';
  // ============================================================

  // ── State ──────────────────────────────────────────────────
  const conversationHistory = [];   // stores {role, content} turns
  let   isBusy = false;

  // ── DOM refs ───────────────────────────────────────────────
  const messagesEl    = document.getElementById('messages');
  const inputEl       = document.getElementById('userInput');
  const sendBtn       = document.getElementById('sendBtn');
  const errorBanner   = document.getElementById('errorBanner');
  const configNotice  = document.getElementById('configNotice');

  // ── Init ───────────────────────────────────────────────────
  if (OPENAI_API_KEY === 'YOUR_OPENAI_API_KEY_HERE') {
    configNotice.style.display = 'block';
  }

  addBotMessage("Hello! How can I help you today?");

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Send on Enter (Shift+Enter = new line)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
  sendBtn.addEventListener('click', handleSend);

  // ── Core send function ─────────────────────────────────────
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isBusy) return;

    hideError();
    addUserMessage(text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLoading(true);

    // Add to history before sending
    conversationHistory.push({ role: 'user', content: text });

    const typingEl = addTypingIndicator();

    try {
      const data = await callOpenAI(text);

      typingEl.remove();
        // Responses API: output[0].content[0].text
    const filteredAnswer = data?.output?.[3]?.content?.[0]?.text
                || data?.output?.[2]?.content?.[0]?.text
                || data?.output?.[4]?.content?.[0]?.text
                || data?.output_text   // some response shapes use this
                || null;
    //            alert(answer);
    // console.log('API response in HTML-->', filteredAnswer, data);

    if (!filteredAnswer) {
      console.warn('Unexpected response shape:', data);
      throw new Error('Received an empty response from the API.');
    }
    
      addBotMessage(filteredAnswer);

      // Save assistant turn
      conversationHistory.push({ role: 'assistant', content: filteredAnswer });

      // Keep last 20 turns to avoid token blowout
      if (conversationHistory.length > 20) {
        conversationHistory.splice(0, 2);
      }

    } catch (err) {
      typingEl.remove();
      showError(err.message);
    } finally {
      setLoading(false);
    }
  }

  const API_URL = window.location.hostname === "localhost"
  ? "http://127.0.0.1:8000"
  : "https://aichatbot-gzfeg5ezfwapffhy.canadacentral-01.azurewebsites.net";

  // ── OpenAI Responses API call testing──────────────────────────────
  async function callOpenAI(userMessage) {


  const res = await fetch(`${API_URL}/chat`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: userMessage,
      history: conversationHistory
    })
  });

  const data = await res.json();

  if (data.error) {
    throw new Error(data.error);
  }

  return data.reply;
}
  // Build input — sends full conversation so the bot has context
  function buildInput(latestMessage) {
    if (conversationHistory.length <= 1) {
      // First message — just send the text directly
      return latestMessage;
    }
    // Subsequent messages — send full history as array
    return conversationHistory;
  }

  // ── UI helpers ─────────────────────────────────────────────
  function addUserMessage(text) {
    const el = createMessageEl('user', text);
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function addBotMessage(text) {
    const el = createMessageEl('bot', text);
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function createMessageEl(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'bot' ? 'AI' : 'You';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    const msgContent = document.createElement('div');
    msgContent.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now();

    bubble.appendChild(msgContent);
    bubble.appendChild(time);
    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    return wrapper;
  }

  function addTypingIndicator() {
    const wrapper = document.createElement('div');
    wrapper.className = 'message bot';
    wrapper.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return wrapper;
  }

  function setLoading(busy) {
    isBusy = busy;
    sendBtn.disabled = busy;
    inputEl.disabled = busy;
    if (!busy) inputEl.focus();
  }

  function showError(msg) {
    errorBanner.textContent = 'Error: ' + msg;
    errorBanner.classList.add('show');
  }

  function hideError() {
    errorBanner.classList.remove('show');
  }

  function scrollToBottom() {
    setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
  }

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
</script>
</body>
</html>
